{% extends 'admin/Base.html' %}
{% load static %}

{% block body %}
<style>
    /* Technical Form Styling */
    .cyber-form-container {
        max-width: 600px;
        margin: 2rem auto;
    }

    .form-header {
        font-family: var(--font-logo);
        color: #ffffff;
        margin-bottom: 2rem;
        border-left: 4px solid var(--primary-glow);
        padding-left: 15px;
    }

    .tech-label {
        color: var(--primary-glow);
        font-family: var(--font-logo);
        font-size: 0.75rem;
        letter-spacing: 1.5px;
        margin-top: 1.5rem;
        display: block;
    }

    .cyber-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: #ffffff;
        padding: 15px;
        width: 100%;
        margin-top: 8px;
        transition: 0.3s;
    }

    .cyber-input:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--primary-glow);
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        color: #ffffff;
        outline: none;
    }

    textarea.cyber-input {
        min-height: 120px;
        resize: none;
    }

    .btn-submit-tech {
        background: transparent;
        border: 1px solid var(--primary-glow);
        color: var(--primary-glow);
        padding: 12px 30px;
        border-radius: 12px;
        font-family: var(--font-logo);
        font-size: 0.85rem;
        transition: 0.3s;
        width: 100%;
        margin-top: 2rem;
    }

    .btn-submit-tech:hover {
        background: var(--primary-glow);
        color: #000;
        box-shadow: 0 0 25px var(--primary-glow);
        transform: translateY(-2px);
    }
</style>

<div class="container animate__animated animate__fadeIn">
    <div class="cyber-form-container">
        <div class="glass-card">
            <div class="form-header">
                <h2 class="mb-1">SYNC <span style="color: var(--primary-glow);">DATASET.</span></h2>
                <p class="text-secondary small">Knowledge Base Neural Pair Entry</p>
            </div>

            <form method="post" action="/myapp/admin_add_dataset_post/">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="tech-label">
                        <i class="fa-solid fa-terminal me-2"></i>INPUT_QUERY (QUESTION)
                    </label>
                    <textarea name="qstn" class="cyber-input" placeholder="Define the user trigger question..." required></textarea>
                </div>

                <div class="mb-4">
                    <label class="tech-label">
                        <i class="fa-solid fa-microchip me-2"></i>SYSTEM_RESPONSE (ANSWER)
                    </label>
                    <textarea name="ans" class="cyber-input" placeholder="Define the intelligence core response..." required></textarea>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn-submit-tech">
                        <i class="fa-solid fa-cloud-arrow-up me-2"></i>INITIALIZE SYNC
                    </button>
                    <a href="/myapp/admin_view_dataset/" class="btn btn-link text-secondary mt-3 d-block small" style="text-decoration: none; font-size: 0.7rem;">
                        <i class="fa-solid fa-arrow-left me-1"></i> RETURN TO REGISTRY
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
