{% extends 'admin/Base.html' %}
{% block body %}
<head>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-accent: #10b981;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
        }

        .form-container {
            max-width: 500px;
            margin: 60px auto;
        }

        .form-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 28px;
            border: 1px solid #edf2f7;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
        }

        .header-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .icon-box {
            width: 54px; height: 54px;
            background: #f0fdf4; color: var(--primary-accent);
            border-radius: 16px; display: grid; place-items: center;
            margin: 0 auto 15px; font-size: 1.5rem;
        }

        .form-label {
            font-weight: 700; font-size: 0.75rem;
            color: #64748b; text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 8px;
            display: block;
        }

        .form-control-custom {
            width: 100%; padding: 12px 16px;
            background: #f9fafb; border: 1px solid #e5e7eb;
            border-radius: 12px; font-size: 0.95rem;
            margin-bottom: 20px; transition: 0.2s;
        }

        .form-control-custom:focus {
            background: #fff; border-color: var(--primary-accent);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); outline: none;
        }

        .btn-save {
            width: 100%; background: #000; color: #fff;
            padding: 14px; border: none; border-radius: 14px;
            font-weight: 700; transition: 0.3s; cursor: pointer;
        }

        .btn-save:hover { background: #1e293b; transform: translateY(-2px); }

        .service-info {
            background: #ecfdf5; color: #065f46;
            padding: 10px 15px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 600; margin-bottom: 25px;
            display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>

<div class="container form-container">
    <div class="form-card">
        <div class="header-box">
            <div class="icon-box">
                <i class="bi bi-file-earmark-arrow-up"></i>
            </div>
            <h4 class="fw-bold mb-1">Add Document</h4>
            <p class="text-muted small">Upload necessary files for this service</p>
        </div>

        <div class="service-info">
            <i class="bi bi-info-circle-fill"></i>
            Service: {{ service.service }}
        </div>

        <form method="post" action="/myapp/admin_add_document_post/{{ service.id }}" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Upload Document</label>
                <input type="file" name="doc" class="form-control-custom" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Details / Remarks</label>
                <textarea name="det" class="form-control-custom" rows="4" placeholder="Briefly describe the document contents..."></textarea>
            </div>

            <button type="submit" class="btn-save shadow-sm">
                <i class="bi bi-cloud-check me-2"></i> Save Document
            </button>
            
            <div class="text-center mt-3">
                <a href="/myapp/admin_view_service/" class="text-muted small text-decoration-none">Cancel and Return</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
