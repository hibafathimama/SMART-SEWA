{% extends 'staff/staffhome.html' %}
{% load static %}

{% block body %}
<style>
    /* Specific styling for Form Elements within the theme */
    .form-label {
        color: var(--primary-glow);
        font-family: var(--font-logo);
        font-size: 0.8rem;
        letter-spacing: 1px;
        margin-top: 1.5rem;
    }

    .form-control-cyber {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: #ffffff;
        padding: 12px 15px;
        transition: 0.3s;
    }

    .form-control-cyber:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--primary-glow);
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        color: #ffffff;
        outline: none;
    }

    textarea.form-control-cyber {
        min-height: 120px;
    }

    .form-header {
        font-family: var(--font-logo);
        color: #ffffff;
        margin-bottom: 2rem;
        border-left: 4px solid var(--primary-glow);
        padding-left: 15px;
    }
</style>

<div class="container py-5 animate__animated animate__fadeIn">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass-card">
                <div class="form-header">
                    <h2 class="mb-1">DATA <span style="color: var(--primary-glow);">ENTRY.</span></h2>
                    <p class="text-secondary small">System Update Interface v2.0</p>
                </div>

                <form method="post" class="mt-4" action="/myapp/staff_add_notification_post/">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label"><i class="fa-solid fa-heading me-2"></i>TITLE</label>
                        <input type="text" class="form-control-cyber w-100" name="title" placeholder="Enter record title..." required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label"><i class="fa-solid fa-align-left me-2"></i>DETAILS</label>
                        <textarea class="form-control-cyber w-100" name="details" placeholder="Describe specific details..."></textarea>
                    </div>

                    <div class="d-flex justify-content-end mt-5">
                        <button type="reset" class="btn text-secondary me-3" style="font-size: 0.8rem; font-family: var(--font-logo);">RESET</button>
                        <button type="submit" class="btn btn-glow">
                            <i class="fa-solid fa-paper-plane me-2"></i>SAVE RECORD
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
