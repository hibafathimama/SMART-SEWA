{% extends 'admin/Base.html' %}
{% load static %}

{% block body %}
<style>
    .onboarding-container { max-width: 900px; margin: 0 auto; }
    
    .onboarding-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 0;
        background: var(--glass-bg);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        overflow: hidden;
        backdrop-filter: blur(20px);
    }

    .onboarding-sidebar {
        background: rgba(0, 229, 255, 0.05);
        padding: 3rem 2rem;
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .form-section { padding: 3rem; }

    /* Profile Preview Styling */
    #preview-circle {
        width: 100px;
        height: 100px;
        border: 2px dashed var(--primary-glow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
        overflow: hidden;
    }
    #preview-circle img { width: 100%; height: 100%; object-fit: cover; }

    .tech-label {
        font-family: var(--font-logo);
        font-size: 0.7rem;
        color: var(--primary-glow);
        margin-bottom: 0.5rem;
        display: block;
        letter-spacing: 1px;
    }
</style>

<div class="container py-5 animate__animated animate__zoomIn">
    <div class="onboarding-container">
        <div class="onboarding-grid shadow-lg">
            
            <div class="onboarding-sidebar">
                <div>
                    <h3 style="font-family: var(--font-logo); color: var(--primary-glow);">ONBOARDING.</h3>
                    <p class="text-secondary small mt-2">Initializing new administrative profile credentials.</p>
                </div>
                
                <div class="text-center">
                    <div id="preview-circle">
                        <i class="fa-solid fa-user-shield fs-2 text-secondary"></i>
                    </div>
                    <h6 id="preview-name" class="fw-bold text-white mb-0">NEW_OPERATOR</h6>
                    <small class="text-info font-monospace">STATUS: PENDING</small>
                </div>

                <div class="mt-4">
                    <div class="small text-muted mb-1"><i class="fa-solid fa-shield-halved me-2"></i>Level 2 Access</div>
                    <div class="small text-muted"><i class="fa-solid fa-fingerprint me-2"></i>Biometric Link</div>
                </div>
            </div>

            <div class="form-section">
                <form action="/admin_add_staff_post/" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-4">
                        <div class="col-md-7">
                            <label class="tech-label">FULL_NAME</label>
                            <input type="text" name="name" required class="form-control" onkeyup="document.getElementById('preview-name').innerText = this.value || 'NEW_OPERATOR'">
                        </div>
                        <div class="col-md-5">
                            <label class="tech-label">GENDER_ID</label>
                            <select name="gender" class="form-select">
                                <option value="Male">MALE</option>
                                <option value="Female">FEMALE</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="tech-label">DOB_STAMP</label>
                            <input type="date" name="dob" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="tech-label">CONTACT_NUM</label>
                            <input type="tel" name="phno" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="tech-label">SYSTEM_EMAIL</label>
                            <input type="email" name="email" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="tech-label">AUTH_USERNAME</label>
                            <input type="text" name="username" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="tech-label">AUTH_PASSWORD</label>
                            <input type="password" name="password" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="tech-label">BIOMETRIC_PHOTO_UPLOAD</label>
                            <input type="file" name="photo" class="form-control" onchange="previewImage(event)">
                        </div>
                        <div class="col-12 pt-3">
                            <button type="submit" class="btn btn-glow w-100 py-3">INITIALIZE PERSONNEL PROTOCOL</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('preview-circle');
            output.innerHTML = `<img src="${reader.result}">`;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
{% endblock %}
