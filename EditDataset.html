{% extends 'admin/Base.html' %}
{% block body %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Dataset Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --edit-theme: #f59e0b; /* Amber/Orange for "Edit" actions */
            --edit-hover: #d97706;
            --bg-soft: #f8fafc;
            --text-dark: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: var(--text-dark);
        }

        .edit-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .edit-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .edit-header {
            background: #fff;
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .edit-header h4 {
            margin: 0;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-dark);
        }

        .edit-body {
            padding: 32px;
        }

        .form-group-custom {
            margin-bottom: 24px;
        }

        .label-custom {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 8px;
        }

        /* Improved Textarea Styling */
        .input-custom {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            transition: all 0.2s ease;
            background-color: #fcfcfc;
            resize: vertical;
        }

        .input-custom:focus {
            outline: none;
            border-color: var(--edit-theme);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
            background-color: #fff;
        }

        .btn-update {
            width: 100%;
            background-color: var(--edit-theme);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-update:hover {
            background-color: var(--edit-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-cancel:hover {
            color: #64748b;
        }

        .id-badge {
            background: #fff7ed;
            color: #c2410c;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #ffedd5;
        }
    </style>
</head>

<body>

<div class="edit-container">
    <div class="edit-card">
        <div class="edit-header">
            <h4>Edit Entry</h4>
            <span class="id-badge">ID: #{{ data.id }}</span>
        </div>

        <div class="edit-body">
            <form method="post" action="/myapp/admin_edit_dataset_post/">
                <input type="hidden" name="id" value="{{ data.id }}">

                <div class="form-group-custom">
                    <label class="label-custom">Dataset Question</label>
                    <textarea
                        name="qstn"
                        class="input-custom"
                        rows="3"
                        placeholder="Update the question here..."
                        required>{{ data.question }}</textarea>
                </div>

                <div class="form-group-custom">
                    <label class="label-custom">Dataset Answer</label>
                    <textarea
                        name="ans"
                        class="input-custom"
                        rows="4"
                        placeholder="Update the answer here..."
                        required>{{ data.answer }}</textarea>
                </div>

                <button type="submit" class="btn-update">
                    Save Changes
                </button>

                <a href="/myapp/admin_manage_dataset/" class="btn-cancel">
                    Go back without saving
                </a>
            </form>
        </div>
    </div>
</div>

</body>
{% endblock %}
