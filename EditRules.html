{% extends 'admin/Base.html' %}
{% block body %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f3f6fc;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-card {
            max-width: 450px;
            background: #ffffff;
            margin: 40px auto;
            padding: 30px 32px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
        }

        .form-card label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            color: #333;
        }

        /* Styling fake textarea inputs */
        .form-card input[type="textarea"] {
            width: 100%;
            height: 90px;
            padding: 10px 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #d6dbee;
            outline: none;
            transition: 0.2s ease;
        }

        .form-card input[type="textarea"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
        }

        .form-card input[type="submit"] {
            width: 100%;
            background: #2563eb;
            color: white;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .form-card input[type="submit"]:hover {
            background: #1e4fd7;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<form method="post" class="form-card" action="/myapp/admin_edit_rules_post/">

    <label>RULES:</label>
    <input type="textarea" name="rules" value="{{ data.rules }}">

    <label>DETAILS:</label>
    <input type="textarea" name="details" value="{{ data.details }}">

    <input type="submit" value="Update">

</form>

</body>
{% endblock %}
