{% extends 'admin/Base.html' %}
{% load static %}

{% block body %}
<style>
    .modify-grid {
        display: grid;
        grid-template-columns: 300px 1fr;
        background: var(--glass-bg);
        border: 1px solid var(--border-color);
        border-radius: 28px;
        overflow: hidden;
        backdrop-filter: blur(20px);
    }

    .modify-sidebar {
        background: rgba(0, 229, 255, 0.05);
        padding: 3rem 2rem;
        border-right: 1px solid var(--border-color);
        text-align: center;
    }

    .service-preview-icon {
        width: 100px;
        height: 100px;
        background: rgba(0, 229, 255, 0.1);
        border: 2px solid var(--primary-glow);
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--primary-glow);
        font-size: 2.5rem;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        margin-bottom: 1.5rem;
    }

    .form-section { padding: 3rem; }
    .tech-label { font-family: var(--font-logo); font-size: 0.7rem; color: var(--primary-glow); text-transform: uppercase; margin-bottom: 8px; display: block; }
</style>

<div class="container py-5 animate__animated animate__fadeIn">
    <div class="modify-grid shadow-lg">
        <div class="modify-sidebar">
            <h4 class="mb-4" style="font-family: var(--font-logo); color: #fff;">SERVICE <span style="color: var(--primary-glow);">META.</span></h4>
            <div class="service-preview-icon">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>
            <h5 class="text-white fw-bold mb-1" id="preview-name">{{ data.service|upper }}</h5>
            <span class="badge rounded-pill border border-info text-info small">ACTIVE_NODE</span>

            <div class="mt-auto pt-5">
                <div class="small text-secondary font-monospace">REF_ID: #SRV-{{ data.id }}</div>
            </div>
        </div>

        <div class="form-section">
            <form method="post" action="/myapp/admin_edit_services_post/">
                {% csrf_token %}
                <input type="hidden" name="id" value="{{ data.id }}">

                <div class="mb-4">
                    <label class="tech-label">Service_Identifier</label>
                    <input type="text" value="{{ data.service }}" name="name" class="form-control" onkeyup="document.getElementById('preview-name').innerText = this.value">
                </div>

                <div class="mb-4">
                    <label class="tech-label">capability_details</label>
                    <textarea name="details" class="form-control" rows="4">{{ data.details }}</textarea>
                </div>

                <div class="row g-3 mb-5">
                    <div class="col-md-6">
                        <label class="tech-label">CREDIT_COST (₹)</label>
                        <input type="number" value="{{ data.cost }}" name="cost" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="tech-label">Est_Process_Time</label>
                        <input type="text" value="{{ data.time }}" name="time" class="form-control">
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-glow flex-grow-1 py-3">
                        <i class="fa-solid fa-sync me-2"></i> SYNCHRONIZE SERVICE
                    </button>
                    <a href="/myapp/admin_view_service/" class="btn btn-outline-secondary px-4 d-flex align-items-center" style="border-radius: 12px; font-family: var(--font-logo); font-size: 0.75rem;">
                        DISCARD
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
