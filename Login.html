<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sewa | Access Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Immersive Community Background */
        .full-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)),
                              url('https://images.unsplash.com/photo-1593113598332-cd288d649433?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Frosted Glass Login Container */
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: slideUpFade 0.8s ease-out;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: #fff;
            color: #3a7bd5;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 22px;
            font-size: 2.2rem;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .form-label {
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            text-align: left;
            opacity: 0.9;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
            border-radius: 0 12px 12px 0;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
            border-color: #00d2ff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Vibrant Action Button */
        .btn-login {
            background: linear-gradient(45deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.5);
        }

        .footer-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .footer-link:hover {
            color: #00d2ff;
        }

        /* Error Notification */
        .msg-alert {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.4);
            color: #ffc9cd;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-radius: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="full-bg">
    <div class="login-container">
        <div class="brand-logo">
            <i class="fas fa-hand-holding-heart"></i>
        </div>
        <h2 class="fw-bold mb-1">Smart Sewa</h2>
        <p class="mb-4 opacity-75 small">Welcome to the world of meaningful service</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert msg-alert d-flex align-items-center" role="alert">
                <i class="fas fa-circle-exclamation me-2"></i>
                <div>{{ message }}</div>
            </div>
            {% endfor %}
        {% endif %}

        <form action="/myapp/login_post/" method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
                    <input type="text" name="uname" class="form-control" placeholder="Enter username..." required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                Get Started <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="mt-4">
            <a href="/myapp/forgot_password_send_otp/" class="footer-link">Forgot password</a>
            <p class="mt-3 mb-0 small opacity-50">© 2025 Smart Sewa Digital Portal</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
