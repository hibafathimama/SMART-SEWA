<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery | Smartseva</title>
<!--    <link rel="icon" href="/static/assets/uoc_logo.png" type="image/png">-->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .bg-uoc-navy { background-color: #001a3d; }
        input, button { border-radius: 0px !important; }

        /* Toast Animations */
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .alert-toast { animation: slideInRight 0.3s ease-out, fadeOut 0.5s ease-in 4.5s forwards; }
        .animate-up { animation: slideInUp 0.4s ease-out; }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Button Loading State */
        button.loading .button-text { display: none; }
        button.loading .spinner { display: inline-block; }
        button.loading { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="fixed top-8 right-8 z-50 space-y-3 w-80">
        {% if messages %}
            {% for message in messages %}
            <div class="alert-toast bg-white border-l-4 p-4 shadow-2xl flex items-start space-x-3
                {% if message.tags == 'error' %} border-red-600 {% elif message.tags == 'warning' %} border-amber-500 {% else %} border-blue-800 {% endif %}">
                <div class="flex-1">
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Security Alert</p>
                    <p class="text-xs font-bold text-slate-700 leading-tight">{{ message }}</p>
                </div>
                <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-slate-900">&times;</button>
            </div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="max-w-md w-full animate-up">
        <div class="bg-white shadow-2xl border border-slate-100 p-10 md:p-14">
            <div class="mb-10 text-center">
<!--                <img src="/static/assets/uoc_logo.png" class="h-12 mx-auto mb-6" alt="CU Logo">-->
                <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Recover Account</h3>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">Identity verification required</p>
            </div>

            <form action="/myapp/forgot_password_send_otp/" method="post" class="space-y-8" id="recoveryForm">
                {% csrf_token %}
                <div class="space-y-2 group">
                    <label class="block text-[10px] font-black uppercase text-slate-500 tracking-widest group-focus-within:text-blue-800 transition-colors">Registered Email Address</label>
                    <input type="email" name="email" required placeholder="name@institution.com"
                        class="w-full border-b-2 border-slate-200 py-3 bg-transparent font-semibold text-slate-800 outline-none focus:border-blue-800 transition-all placeholder:text-slate-300">
                    <p class="text-[9px] text-slate-400 leading-relaxed italic">A 6-digit authorization code will be dispatched to this address.</p>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-slate-900 py-5 text-white text-[11px] font-black uppercase tracking-[0.4em] hover:bg-blue-800 transition-all shadow-xl flex items-center justify-center">
                    <span class="button-text">Dispatch OTP &rarr;</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="mt-10 pt-6 border-t border-slate-100 text-center">
                <a href="/myapp/loginpage/" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-blue-800 transition-colors">
                    Return to Credentials Entry
                </a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('recoveryForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', function() {
            // Add loading class to show spinner and prevent double clicks
            btn.classList.add('loading');
            btn.disabled = true;
        });

        document.addEventListener('animationend', (e) => {
            if (e.animationName === 'fadeOut') e.target.remove();
        });
    </script>
</body>
</html>
